<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login — ZyanLabs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* subtle background glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle,
                rgba(124, 92, 255, 0.07),
                rgba(59, 130, 246, 0.05),
                transparent 65%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 22px;
            padding: 48px 40px;
        }

        .login-logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(90deg, #5aa9ff, #7c5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.38);
            margin-bottom: 36px;
        }

        .login-card h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .field { margin-bottom: 20px; }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        input:focus {
            border-color: rgba(124, 92, 255, 0.55);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #3b82f6, #7c5cff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            opacity: 0.9;
            box-shadow: 0 8px 24px rgba(124, 92, 255, 0.35);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 8px;
            font-size: 13px;
            color: #fca5a5;
            text-align: center;
        }

        .error-msg.show { display: block; }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-logo">ZyanLabs</div>
        <p class="login-sub">Admin Panel</p>

        <h1>Sign In</h1>
        <p style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;">
            Enter your credentials to access the dashboard.
        </p>

        <form id="loginForm" autocomplete="off">
            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="admin@zyanlabs.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        // Skip login page if session is already active
        (async function () {
            try {
                const res = await fetch('/api/check-auth', { credentials: 'include' });
                if (res.ok) window.location.replace('/admin.html');
            } catch (_) { /* no active session — stay on login page */ }
        })();

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            btn.disabled    = true;
            btn.textContent = 'Signing in…';
            err.classList.remove('show');

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res  = await fetch('/api/login', {
                    method:      'POST',
                    headers:     { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body:        JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!data.success) throw new Error(data.error || 'Login failed.');

                window.location.replace('/admin.html');

            } catch (ex) {
                err.textContent = ex.message;
                err.classList.add('show');
                btn.disabled    = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>

</body>
</html>
